<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Annayya ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        h1 {
            font-size: 40px;
            color: white;
            text-align: center;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 25px red; }
        }
    </style>
</head>
<body>
    <h1>🎉 Happy Birthday Annayya ❤️ 🎉</h1>
</body>
</html>
